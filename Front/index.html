<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Festival Jesús María - Sistema de Decisión</title>
    <meta name="description" content="Sistema de decisión territorial para eventos masivos" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <script>
      (function() {
        if (sessionStorage.getItem('sw_purged') === '1') return;
        if (!('serviceWorker' in navigator)) return;
        window.addEventListener('load', async function() {
          var regs = await navigator.serviceWorker.getRegistrations();
          if (regs.length === 0) {
            var keys = await caches.keys();
            if (keys.length === 0) return;
          }
          for (var reg of regs) {
            await reg.unregister();
          }
          var cacheKeys = await caches.keys();
          await Promise.all(cacheKeys.map(function(k) { return caches.delete(k); }));
          sessionStorage.setItem('sw_purged', '1');
          location.reload();
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
